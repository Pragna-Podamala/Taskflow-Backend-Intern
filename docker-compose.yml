version: '3.9'

services:
  # ── MongoDB ──────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: taskflow_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: secret
      MONGO_INITDB_DATABASE: taskmanager
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - taskflow_net
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (optional caching) ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: taskflow_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - taskflow_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API ────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      target: production
    container_name: taskflow_api
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      - MONGODB_URI=mongodb://admin:secret@mongodb:27017/taskmanager?authSource=admin
      - REDIS_URL=redis://redis:6379
    ports:
      - "5000:5000"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - taskflow_net
    volumes:
      - ./backend/logs:/app/logs

  # ── Frontend ───────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
    container_name: taskflow_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - taskflow_net

volumes:
  mongo_data:

networks:
  taskflow_net:
    driver: bridge
